name: Daily DB Backup

on:
  # Runs every day at 03:00 UTC = 00:00 Montevideo (UTC-3)
  schedule:
    - cron: "0 3 * * *"
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: PostgreSQL Backup
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          BACKUP_FILENAME="backup-$(date -u '+%Y-%m-%d').dump"
          pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="$BACKUP_FILENAME"
          echo "BACKUP_FILENAME=$BACKUP_FILENAME" >> "$GITHUB_ENV"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILENAME }}
          # Retain backups for 90 days (GitHub maximum for public repos; 400 for private)
          retention-days: 90
          if-no-files-found: error
